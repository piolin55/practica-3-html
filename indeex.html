<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Bubble Sort Mejorado</title>

<style>
  body {
    font-family: Arial;
    text-align: center;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
  }

  h1 {
    margin-top: 20px;
  }

  #controls {
    margin: 20px;
  }

  select, button {
    padding: 10px;
    margin: 5px;
    border-radius: 6px;
    border: none;
  }

  button {
    background: #00c9a7;
    color: white;
    cursor: pointer;
  }

  button:hover {
    background: #00a68a;
  }

  #canvas {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    height: 320px;
    width: 85%;
    margin: auto;
    background: white;
    border-radius: 10px;
    padding: 10px;
  }

  .bar {
    margin: 0 4px;
    background: #4CAF50;
    width: 40px;
    text-align: center;
    color: white;
    border-radius: 5px 5px 0 0;
    transition: all 0.3s ease;
  }

  .active {
    background: #ff9800 !important;
  }

  .swap {
    background: #f44336 !important;
  }
</style>
</head>

<body>

<h1>📊 Bubble Sort Visual Mejorado</h1>

<div id="controls">
  <select id="criterio">
    <option value="tiempo_produccion">Producción</option>
    <option value="tiempo_entrega">Entrega</option>
    <option value="prioridad">Prioridad</option>
  </select>

  <select id="orden">
    <option value="asc">Ascendente</option>
    <option value="desc">Descendente</option>
  </select>

  <button onclick="iniciar()">Iniciar</button>
</div>

<div id="canvas"></div>

<script>
class Pedido {
  constructor(p, e, pr) {
    this.tiempo_produccion = p;
    this.tiempo_entrega = e;
    this.prioridad = pr;
  }
}

let pedidos = [];
let ejecutando = false;

// Generar pedidos
function generarPedidos(n = 10) {
  pedidos = [];
  for (let i = 0; i < n; i++) {
    pedidos.push(new Pedido(
      Math.floor(Math.random() * 200) + 20,
      Math.floor(Math.random() * 400) + 50,
      Math.floor(Math.random() * 5) + 1
    ));
  }
}

// Dibujar barras
function dibujar(arr, key, i=-1, j=-1) {
  const canvas = document.getElementById("canvas");
  canvas.innerHTML = "";

  arr.forEach((p, index) => {
    const bar = document.createElement("div");
    let valor = p[key];

    bar.className = "bar";
    bar.style.height = valor + "px";
    bar.textContent = valor;

    if (index === i || index === j) {
      bar.classList.add("active");
    }

    canvas.appendChild(bar);
  });
}

// Sleep
function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

// Bubble Sort optimizado
async function bubbleSort(arr, key, asc=true) {
  let n = arr.length;

  for (let i = 0; i < n; i++) {
    let swapped = false;

    for (let j = 0; j < n - i - 1; j++) {

      dibujar(arr, key, j, j+1);
      await sleep(300);

      let cond = asc
        ? arr[j][key] > arr[j+1][key]
        : arr[j][key] < arr[j+1][key];

      if (cond) {
        [arr[j], arr[j+1]] = [arr[j+1], arr[j]];
        swapped = true;

        dibujar(arr, key, j, j+1);
        await sleep(300);
      }
    }

    // Optimización: si no hubo cambios, ya está ordenado
    if (!swapped) break;
  }

  dibujar(arr, key);
  ejecutando = false;
}

// Iniciar
function iniciar() {
  if (ejecutando) return; // evita doble ejecución

  ejecutando = true;

  generarPedidos();

  const criterio = document.getElementById("criterio").value;
  const orden = document.getElementById("orden").value;

  dibujar(pedidos, criterio);
  bubbleSort(pedidos, criterio, orden === "asc");
}
</script>

</body>
</html>
