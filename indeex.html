<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Bubble Sort PRO + Rendimiento</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    background: #e0f2fe;
    margin: 0;
}

/* HEADER */
.header {
    background: #0ea5e9;
    color: white;
    padding: 10px;
    text-align: center;
}

/* CONTROLES */
.controls {
    text-align: center;
    padding: 10px;
}

select, button, input {
    padding: 8px;
    margin: 5px;
    border-radius: 8px;
    border: none;
}

button {
    background: #2563eb;
    color: white;
    cursor: pointer;
}

/* GRID MÁS COMPACTO */
.main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    padding: 8px;
}

/* TARJETAS MÁS PEQUEÑAS (~2cm menos) */
.card {
    background: white;
    border-radius: 10px;
    padding: 8px;
    transform: scale(0.90);
    transform-origin: top center;
}

/* SUBGRID PARA RENDIMIENTO + RESULTADO */
.rendimiento-container {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 10px;
}

/* TABLA */
table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: #1e3a8a;
    color: white;
}

td {
    text-align: center;
    padding: 5px;
    border-bottom: 1px solid #ddd;
}

/* RESULTADO */
.resultado {
    background: linear-gradient(to right, #0ea5e9, #6366f1);
    color: white;
    padding: 10px;
    border-radius: 10px;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="header">✔ Simulación Bubble Sort</div>

<div class="controls">
<select id="criterio">
    <option value="produccion">Producción</option>
    <option value="entrega">Entrega</option>
    <option value="prioridad">Prioridad</option>
</select>

<select id="orden">
    <option value="asc">Ascendente</option>
    <option value="desc">Descendente</option>
</select>

<input type="range" id="velocidad" min="50" max="1000" value="200">

<button onclick="iniciar()">▶ Ejecutar</button>

<p>Operaciones: <span id="ops">0</span></p>
</div>

<div class="main">

<div class="card">
    <h3>📊 Ordenamiento</h3>
    <canvas id="grafico"></canvas>
</div>

<div class="card">
    <h3>📋 Tabla</h3>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Producción</th>
                <th>Entrega</th>
                <th>Prioridad</th>
                <th>Tiempo</th>
            </tr>
        </thead>
        <tbody id="tabla"></tbody>
    </table>
</div>

<div class="card">
    <div class="rendimiento-container">

        <div>
            <h3>📈 Rendimiento</h3>
            <canvas id="rendimiento"></canvas>
        </div>

        <div class="resultado" id="mejor">
            🔍 Resultado aparecerá aquí
        </div>

    </div>
</div>

</div>

<script>
let data = [];
let chart;
let chartRendimiento;
let operaciones = 0;
let historialOps = [];
let tiempoTotal = 0;

// DATOS
function generarDatos() {
    data = [];
    for (let i = 0; i < 8; i++) {
        data.push({
            id: i + 1,
            produccion: Math.floor(Math.random() * 100),
            entrega: Math.floor(Math.random() * 80),
            prioridad: Math.floor(Math.random() * 5 + 1),
            tiempo: 0
        });
    }
}

// COLORES
function getColor(p) {
    if (p >= 4) return "#1e3a8a";
    if (p == 3) return "#2563eb";
    return "#06b6d4";
}

// TABLA
function crearTabla() {
    let html = "";
    data.forEach(d => {
        html += `
        <tr>
            <td>${d.id}</td>
            <td>${d.produccion}</td>
            <td>${d.entrega}</td>
            <td>${d.prioridad}</td>
            <td>${d.tiempo}</td>
        </tr>`;
    });
    document.getElementById("tabla").innerHTML = html;
}

// GRÁFICO
function crearGrafico(criterio) {
    chart = new Chart(document.getElementById("grafico"), {
        type: "bar",
        data: {
            labels: data.map(d => "P" + d.id),
            datasets: [{
                data: data.map(d => d[criterio]),
                backgroundColor: data.map(d => getColor(d.prioridad))
            }]
        },
        options: { animation: false }
    });
}

// RENDIMIENTO
function crearGraficoRendimiento() {
    chartRendimiento = new Chart(document.getElementById("rendimiento"), {
        type: "line",
        data: {
            labels: [],
            datasets: [{
                label: "Operaciones",
                data: [],
                borderColor: "#2563eb"
            }]
        },
        options: { animation: false }
    });
}

function actualizarRendimiento() {
    chartRendimiento.data.labels.push(historialOps.length);
    chartRendimiento.data.datasets[0].data.push(operaciones);
    chartRendimiento.update();
}

// ACTUALIZAR
function actualizar(criterio, i, j) {
    let colores = data.map(d => getColor(d.prioridad));

    if (i !== undefined) colores[i] = "#0ea5e9";
    if (j !== undefined) colores[j] = "#6366f1";

    chart.data.datasets[0].data = data.map(d => d[criterio]);
    chart.data.datasets[0].backgroundColor = colores;
    chart.update();

    crearTabla();
}

// BUBBLE
async function bubble(criterio, asc) {
    let inicio = performance.now();
    operaciones = 0;
    historialOps = [];

    for (let i = 0; i < data.length; i++) {
        for (let j = 0; j < data.length - i - 1; j++) {

            operaciones++;
            document.getElementById("ops").innerText = operaciones;

            historialOps.push(operaciones);
            actualizarRendimiento();

            if ((asc && data[j][criterio] > data[j+1][criterio]) ||
                (!asc && data[j][criterio] < data[j+1][criterio])) {

                [data[j], data[j+1]] = [data[j+1], data[j]];
            }

            let tiempo = Math.floor(performance.now() - inicio);
            data[j].tiempo = tiempo;
            data[j+1].tiempo = tiempo;

            actualizar(criterio, j, j+1);

            let vel = document.getElementById("velocidad").value;
            await new Promise(r => setTimeout(r, vel));
        }
    }

    tiempoTotal = Math.floor(performance.now() - inicio);
    mostrarResultado(criterio, asc);
}

// RESULTADO
function mostrarResultado(criterio, asc) {
    let mejor = asc ? data[0] : data[data.length - 1];

    document.getElementById("mejor").innerHTML = `
        🏆 <b>Resultado</b><br><br>
        Prioridad: ${mejor.prioridad}<br>
        Tiempo total: ${tiempoTotal} ms
    `;
}

// INICIAR
function iniciar() {
    if (chart) chart.destroy();
    if (chartRendimiento) chartRendimiento.destroy();

    generarDatos();

    let criterio = document.getElementById("criterio").value;
    let asc = document.getElementById("orden").value === "asc";

    crearTabla();
    crearGrafico(criterio);
    crearGraficoRendimiento();

    bubble(criterio, asc);
}
</script>

</body>
</html>
